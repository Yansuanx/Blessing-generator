<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>暗夜星语 | 祝福生成器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-page" class="page">
        <div class="glass-card">
            <h1>暗夜星语</h1>
            <p>在深紫色的梦境中，寻找一点慰藉。</p>
            <button id="enter-btn">进入星界</button>
        </div>
    </div>

    <div id="main-page" class="page hidden">
        <div class="glass-card">
            <h2 id="blessing-text">愿星辰指引你的路...</h2>
            <button id="gen-btn">获取新祝福</button>
            <button id="back-btn" class="secondary">返回</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
